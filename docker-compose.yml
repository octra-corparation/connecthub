version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: connecthub
      POSTGRES_USER: connecthub
      POSTGRES_PASSWORD: connecthub_password
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U connecthub']
      interval: 5s
      timeout: 5s
      retries: 5

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: ./server/.env
    environment:
      DATABASE_URL: postgresql://connecthub:connecthub_password@postgres:5432/connecthub?schema=public
    ports:
      - '4000:4000'
    depends_on:
      postgres:
        condition: service_healthy

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: ./client/.env.local
    ports:
      - '3000:3000'
    depends_on:
      - server

volumes:
  postgres_data:
